version: '3.8'

services:
  etl_app:
    build: .
    container_name: pandas_etl_prod
    env_file:
      - .env
    environment:
      # This special address allows the Linux container to talk to your Windows SQL Server
      - DB_SERVER=host.docker.internal
      - AUTH_MODE=${AUTH_MODE}
    networks:
      - etl_network
    # Extra permission needed for Azure Identity to work inside a container
    cap_add:
      - SYS_ADMIN 
    volumes:
      - ${HOST_LOGS_PATH}:/app/logs
      - ${HOST_EXPORTS_PATH}:/app/exports
      - ${HOST_ARCHIVE_PATH}:/app/archive
      - ${HOST_DATA_PATH}:/app/data
networks:
  etl_network:
    driver: bridge